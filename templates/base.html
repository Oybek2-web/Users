<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Online Magazin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'magazin:magazin_list' %}">Online Magazin</a>

        <!-- SEARCH -->
        <form class="d-flex ms-3" method="get" action="{% url 'magazin:magazin_list' %}">
            <input class="form-control me-2"
                   type="search"
                   name="search"
                   placeholder="Search"
                   value="{{ request.GET.search|default:'' }}">
            <button class="btn btn-outline-light" type="submit">
                Search
            </button>
        </form>

        <div class="d-flex ms-auto">
            <a href="{% url 'magazin:profil_list' %}" class="btn btn-outline-light">
                Profil
            </a>

            <a href="{% url 'magazin:magazin_create' %}" class="btn btn-outline-light">
                E'lon joylash
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4 flex-grow-1">
    {% block content %}
    {% endblock %}
</div>

<footer class="bg-dark text-white text-center p-3 mt-auto">
    2026 Online Magazin
</footer>

</body>
</html>
